apiVersion: kafkabackup.com/v1alpha1
kind: KafkaRestore
metadata:
  name: pitr-restore
  namespace: kafka
  labels:
    strimzi.io/cluster: dr-kafka-cluster
spec:
  strimziClusterRef:
    name: dr-kafka-cluster

  authentication:
    type: tls
    kafkaUserRef:
      name: restore-service-account

  backupRef:
    name: daily-backup
    backupId: "backup-20260213-020000"

  # Restore only selected topics from the backup. Glob patterns by default;
  # prefix with ~ for regex. Matched against source topic names, before
  # topicMapping renames. Omit to restore every topic in the backup.
  topics:
    include:
      - "orders"
      - "payments"

  pointInTime:
    timestamp: "2026-02-13T01:30:00.000Z"

  logging:
    level: info
    format: json

  env:
    - name: RUST_LOG
      value: "kafka_backup=info,rdkafka=warn"

  topicMapping:
    - sourceTopic: "orders"
      targetTopic: "orders-restored"
    - sourceTopic: "payments"
      targetTopic: "payments-restored"

  consumerGroups:
    restore: true
    mapping:
      - sourceGroup: "order-processor"
        targetGroup: "order-processor"

  restore:
    topicCreation: auto
    existingTopicPolicy: append
    parallelism: 4

  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  template:
    pod:
      # Service account for the restore job pod; must exist in this namespace.
      # Defaults to the operator-wide backupJobs.serviceAccountName.
      serviceAccountName: kafka-backup-jobs
      hostAliases:
        - ip: "10.10.0.5"
          hostnames:
            - "s3.internal"
