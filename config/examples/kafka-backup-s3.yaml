apiVersion: kafkabackup.com/v1alpha1
kind: KafkaBackup
metadata:
  name: daily-backup
  namespace: kafka
  labels:
    strimzi.io/cluster: my-kafka-cluster
spec:
  strimziClusterRef:
    name: my-kafka-cluster

  authentication:
    type: tls
    kafkaUserRef:
      name: backup-service-account

  topics:
    include:
      - "orders-*"
      - "payments-*"
    exclude:
      - "*-internal"
      - "__*"

  storage:
    type: s3
    s3:
      bucket: my-kafka-backups
      region: eu-west-1
      prefix: "strimzi/my-kafka-cluster/"
      accessKeySecret:
        name: backup-s3-credentials
        key: access-key-id
      secretKeySecret:
        name: backup-s3-credentials
        key: secret-access-key

  backup:
    compression: zstd
    segmentSize: 268435456
    parallelism: 4
    stopAtCurrentOffsets: true

  logging:
    level: warn
    format: json
    modules:
      kafka_backup: warn
      rdkafka: info

  env:
    - name: RUST_LOG
      value: "kafka_backup=warn,rdkafka=info"

  schedule:
    cron: "0 2 * * *"
    timezone: "UTC"

  retention:
    maxBackups: 30
    maxAge: "30d"
    pruneOnSchedule: true

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  template:
    pod:
      hostAliases:
        - ip: "10.10.0.5"
          hostnames:
            - "s3.internal"
